services:
  - type: web
    name: empdsr-new
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /login
    envVars:
      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m"
      - key: SPRING_PROFILES_ACTIVE
        value: "production"
    # Auto-deploy when you push to main branch
    autoDeploy: true
    # Disk persistence for H2 database
    disk:
      name: empdsr-data
      mountPath: /app/data
      sizeGB: 1
