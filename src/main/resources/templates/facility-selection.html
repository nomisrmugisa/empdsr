<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Select Facility - PDSR</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.6.0/css/bootstrap.min.css}">
    <style>
        body {
            background: rgb(57, 106, 147);
            /* Match dashboard background */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .selection-card {
            width: 100%;
            max-width: 550px;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            background: white;
        }

        .facility-list {
            max-height: 480px;
            /* Approximately 7 items */
            overflow-y: auto;
            margin-bottom: 1.5rem;
            padding-right: 5px;
        }

        /* Custom scrollbar */
        .facility-list::-webkit-scrollbar {
            width: 6px;
        }

        .facility-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .facility-item {
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
            margin-bottom: 0.75rem;
            padding: 1rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
        }

        .facility-item:hover {
            background: #f0f7ff;
            border-color: #007bff;
            transform: translateX(5px);
        }

        .facility-item.selected {
            background: #e7f3ff;
            border-color: #007bff;
            border-width: 2px;
        }

        .search-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        #facilitySearch {
            padding-left: 2.5rem;
            border-radius: 20px;
            border: 2px solid #eee;
            transition: border-color 0.3s;
        }

        #facilitySearch:focus {
            border-color: #007bff;
            box-shadow: none;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .btn-select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="selection-card">
        <h2 class="text-center font-weight-bold mb-3" style="color: rgb(50, 94, 129);">Select Facility</h2>
        <p class="text-muted text-center mb-4">Please search and select the facility you wish to work with.</p>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="facilitySearch" class="form-control" placeholder="Search facilities..."
                autocomplete="off">
        </div>

        <form th:action="@{/select-facility}" method="post" id="selectionForm">
            <div class="facility-list" id="facilityList">
                <div th:each="facility : ${facilities}" class="facility-item"
                    th:data-name="${#strings.toLowerCase(facility.name)}">
                    <div class="custom-control custom-radio w-100">
                        <input type="radio" th:id="${facility.id}" name="facilityId" th:value="${facility.id}"
                            class="custom-control-input" onchange="enableButton(this)">
                        <label class="custom-control-label font-weight-bold w-100" th:for="${facility.id}">
                            <span th:text="${facility.name}"></span>
                            <div class="small text-muted font-weight-normal" th:text="'Level ' + ${facility.level}">
                            </div>
                        </label>
                    </div>
                </div>
                <div id="noResults" class="text-center py-4 text-muted" style="display: none;">
                    No facilities match your search.
                </div>
            </div>

            <button id="selectBtn" type="submit" class="btn btn-primary btn-select" disabled>Continue to
                Dashboard</button>
        </form>
    </div>

    <!-- Font Awesome for search icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <script>
        function enableButton(radio) {
            document.getElementById('selectBtn').disabled = false;
            // Highlight selected item
            document.querySelectorAll('.facility-item').forEach(item => item.classList.remove('selected'));
            radio.closest('.facility-item').classList.add('selected');
        }

        // Add click listener to the whole item for better UX
        document.querySelectorAll('.facility-item').forEach(item => {
            item.addEventListener('click', function (e) {
                if (e.target.tagName !== 'INPUT') {
                    const radio = this.querySelector('input');
                    radio.checked = true;
                    enableButton(radio);
                }
            });
        });

        // Real-time search/filter
        const searchInput = document.getElementById('facilitySearch');
        const items = document.querySelectorAll('.facility-item');
        const noResults = document.getElementById('noResults');

        searchInput.addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();
            let visibleCount = 0;

            items.forEach(item => {
                const name = item.getAttribute('data-name');
                if (name.includes(query)) {
                    item.style.display = 'flex';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            noResults.style.display = visibleCount === 0 ? 'block' : 'none';
        });
    </script>
</body>

</html>
