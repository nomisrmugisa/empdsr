# Production configuration for Render.com deployment
server.port=${PORT:8080}
server.servlet.session.timeout=2592000s

# Thymeleaf configuration
spring.thymeleaf.template-loader-path=classpath:/templates
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=true
spring.web.resources.add-mappings=true

# JPA configuration
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy

# H2 Database configuration for production (file-based)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.datasource.jdbcUrl=jdbc:h2:file:./data/pdsrv2;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Secondary datasource
spring.datasource1.initialization-mode=always
spring.datasource1.jdbcUrl=jdbc:h2:file:./slave/pdsrv2;DB_CLOSE_ON_EXIT=FALSE
spring.datasource1.driverClassName=org.h2.Driver
spring.datasource1.username=sa
spring.datasource1.password=password

# H2 Console (disabled in production for security)
spring.h2.console.enabled=false

# Mail configuration (keep existing settings)
spring.mail.host=mail.olincgroup.com
spring.mail.port=587
spring.mail.username=no-reply@olincgroup.com
spring.mail.password=no-REPLY-11nc
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging configuration
logging.level.org.pdsr=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
